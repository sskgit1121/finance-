spring.application.name=finance

# Minimal configuration for internship assignment
server.port=8080

# H2 Database - Just works, no setup needed
spring.datasource.url=jdbc:h2:mem:finance_db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA - Auto-create tables
#spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Enable H2 Console for debugging
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Enable data.sql execution
spring.sql.init.mode=always
spring.sql.init.platform=h2
spring.sql.init.data-locations=classpath:data.sql

#DELETE FROM transactions;
#
#But at that moment, the table transactions does NOT exist yet.
#
#This happens because in Spring Boot:
#
#data.sql runs before Hibernate creates tables (by default)
#So the DELETE fails immediately
spring.jpa.hibernate.ddl-auto=create
spring.jpa.defer-datasource-initialization=true

# Logging
logging.level.com.finance=DEBUG


# Application info
app.name=Finance Backend
app.version=1.0.0
